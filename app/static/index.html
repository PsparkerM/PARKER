<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>P.A.R.K.E.R.</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:#08080f;--bg2:#0f0f1a;--bg3:#151525;
  --surface:rgba(255,255,255,0.045);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#f5c518;--gold2:#d4a800;--blue:#3d7fff;--red:#ff3355;
  --green:#1ec76a;--orange:#ff7a00;
  --text:#eeeef5;--text2:#9999bb;--text3:#55556a;
  --radius:16px;--radius-sm:10px;--nav-h:68px;--hdr-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.4}
input,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
textarea{resize:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 50% 35% at 80% 0%,rgba(245,197,24,.07) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 0% 90%,rgba(61,127,255,.06) 0%,transparent 60%);}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* HEADER */
.hdr{height:var(--hdr-h);flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 18px;
  background:rgba(8,8,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{font-size:14px;font-weight:800;letter-spacing:2.5px;color:var(--gold);text-shadow:0 0 20px rgba(245,197,24,.4)}
.hdr-title{flex:1;font-size:15px;font-weight:600;color:var(--text2)}
.hdr-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#000;
  box-shadow:0 0 12px rgba(245,197,24,.3)}
.streak-chip{display:flex;align-items:center;gap:5px;background:rgba(255,122,0,.12);
  border:1px solid rgba(255,122,0,.25);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--orange)}

/* NAV */
.nav{height:var(--nav-h);flex-shrink:0;display:flex;align-items:stretch;
  background:rgba(8,8,15,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.3px;transition:color .15s}
.ntab .ni{font-size:22px;line-height:1;transition:transform .15s}
.ntab.on{color:var(--gold)}.ntab.on .ni{transform:scale(1.1)}
.ntab.center .ni{font-size:26px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(245,197,24,.4);color:#000;margin-bottom:2px}
.ntab.center.on .ni{box-shadow:0 0 28px rgba(245,197,24,.6)}

/* SCREENS */
.screen{display:none;flex:1;overflow:hidden;flex-direction:column;animation:fadeIn .2s ease}
.screen.on{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ONBOARDING */
#sc-onboard{background:var(--bg)}
.onb-wrap{flex:1;display:flex;flex-direction:column;padding:20px 20px 32px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.onb-step{display:none;flex-direction:column;gap:22px;padding-top:8px;animation:fadeIn .25s ease}
.onb-step.on{display:flex}
.onb-q{font-size:24px;font-weight:800;line-height:1.25}
.onb-sub{font-size:14px;color:var(--text2);line-height:1.5;margin-top:-14px}
.onb-progress{display:flex;gap:6px;margin-bottom:8px;padding-top:6px}
.onb-dot{height:4px;flex:1;border-radius:2px;background:var(--surface2);transition:background .3s}
.onb-dot.done{background:var(--gold)}.onb-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(245,197,24,.5)}
.field{display:flex;flex-direction:column;gap:6px}
.flbl{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.finput{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;color:var(--text);font-size:16px;font-weight:600;outline:none;
  -webkit-appearance:none;transition:border-color .15s;width:100%}
.finput:focus{border-color:rgba(245,197,24,.5);box-shadow:0 0 0 3px rgba(245,197,24,.08)}
.finput.big{font-size:28px;text-align:center;letter-spacing:1px}
.finput::placeholder{color:var(--text3)}
.funit{font-size:13px;color:var(--text3);text-align:center;margin-top:2px}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g-btn{padding:15px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;text-align:center;
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;cursor:pointer}
.g-btn.on{border-color:var(--gold);background:rgba(245,197,24,.12);color:var(--gold)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.onb-nav{display:flex;gap:10px;margin-top:4px}
.btn-primary{flex:1;padding:15px;border-radius:var(--radius-sm);font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  box-shadow:0 4px 20px rgba(245,197,24,.3);transition:transform .1s}
.btn-primary:active{transform:scale(.97)}.btn-primary:disabled{opacity:.5;transform:none}
.btn-back{width:48px;height:48px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end}

/* DATE PICKER */
.dp-wrap{display:flex;height:200px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);overflow:hidden;position:relative}
.dp-col{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.dp-col::-webkit-scrollbar{display:none}
.dp-item{height:40px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;
  font-size:16px;font-weight:600;color:var(--text3);user-select:none}
.dp-item.sel{color:var(--text);font-size:19px;font-weight:800}
.dp-pad{height:80px;flex-shrink:0}
.dp-highlight{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:40px;
  pointer-events:none;border-top:1px solid rgba(245,197,24,.3);border-bottom:1px solid rgba(245,197,24,.3);
  background:rgba(245,197,24,.06)}
.dp-date-disp{text-align:center;font-size:14px;color:var(--text2);padding:4px 0}

/* HOME */
.home-scrl{overflow-y:auto;flex:1;padding:14px 14px 8px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.ring-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px;display:flex;align-items:center;gap:18px}
.ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-cal{font-size:19px;font-weight:800}.ring-lbl{font-size:10px;color:var(--text3);margin-top:1px}
.ring-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.ring-row{display:flex;align-items:center;gap:7px}
.ring-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ring-name{font-size:12px;color:var(--text2);width:50px}
.ring-bar-wrap{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.ring-bar{height:100%;border-radius:2px;transition:width .5s ease}
.ring-val{font-size:12px;font-weight:700;min-width:40px;text-align:right}
.water-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px}
.water-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.water-ttl{font-size:14px;font-weight:700}.water-info{font-size:13px;font-weight:700;color:var(--blue)}
.water-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:12px}
.water-bar{height:100%;background:var(--blue);border-radius:3px;transition:width .4s ease}
.water-btns{display:flex;gap:8px}
.water-btn{flex:1;padding:11px 4px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;
  border:1.5px solid rgba(61,127,255,.3);background:rgba(61,127,255,.08);color:var(--blue);transition:all .15s}
.water-btn:active{background:rgba(61,127,255,.18)}
.water-btn.reset{border-color:var(--border2);background:var(--surface);color:var(--text3);flex:0;padding:11px 14px}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.plan-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;user-select:none}
.plan-hd:active{opacity:.8}.plan-ttl{font-size:14px;font-weight:700}
.plan-chevron{font-size:12px;color:var(--text3);transition:transform .2s}
.plan-card.open .plan-chevron{transform:rotate(180deg)}
.plan-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);padding-top:12px;
  font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap;word-break:break-word}
.plan-card.open .plan-body{display:block}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px}
.day-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.day-ttl{font-size:14px;font-weight:700}
.day-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;
  background:rgba(30,199,106,.12);border:1px solid rgba(30,199,106,.25);color:var(--green)}
.day-badge.rest{background:rgba(61,127,255,.12);border-color:rgba(61,127,255,.25);color:var(--blue)}

/* CHAT */
.chat-wrap{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;
  -webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.msg{display:flex;flex-direction:column;max-width:85%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.p{align-self:flex-start}.msg.u{align-self:flex-end}
.msender{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:3px;padding-left:2px}
.mbub{padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.msg.p .mbub{background:var(--bg3);border:1px solid var(--border2);border-bottom-left-radius:4px;color:var(--text)}
.msg.u .mbub{background:linear-gradient(135deg,rgba(245,197,24,.2),rgba(245,197,24,.1));
  border:1px solid rgba(245,197,24,.25);border-bottom-right-radius:4px}
.typing{display:flex;gap:4px;padding:12px 14px;align-self:flex-start;background:var(--bg3);
  border:1px solid var(--border2);border-radius:18px;border-bottom-left-radius:4px;width:fit-content}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:td 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-input-area{flex-shrink:0;padding:10px 12px 14px;background:rgba(8,8,15,.96);
  backdrop-filter:blur(16px);border-top:1px solid var(--border)}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-in{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:22px;
  padding:11px 16px;color:var(--text);font-size:15px;outline:none;max-height:96px;
  -webkit-appearance:none;transition:border-color .15s}
.chat-in:focus{border-color:rgba(245,197,24,.4)}.chat-in::placeholder{color:var(--text3)}
.send-btn{width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-size:18px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(245,197,24,.3);transition:transform .1s}
.send-btn:active{transform:scale(.88)}.send-btn:disabled{opacity:.4;transform:none}

/* TRACKER */
.tracker-scrl{overflow-y:auto;flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px}
.card-ttl{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-ttl span{font-size:16px}
.food-row{display:flex;gap:8px}
.food-ta{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;color:var(--text);font-size:14px;min-height:64px;outline:none;-webkit-appearance:none}
.food-ta:focus{border-color:rgba(245,197,24,.4)}.food-ta::placeholder{color:var(--text3)}
.cam-btn{width:48px;align-self:stretch;border-radius:var(--radius-sm);border:1.5px solid rgba(61,127,255,.3);
  background:rgba(61,127,255,.08);color:var(--blue);font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#photo-input{display:none}
.calc-btn{width:100%;padding:13px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  box-shadow:0 0 14px rgba(245,197,24,.2);margin-top:8px;transition:opacity .15s}
.calc-btn:disabled{opacity:.5}
.food-result{display:none;margin-top:10px}
.ftable{width:100%;border-collapse:collapse;font-size:12px}
.ftable th{color:var(--text3);text-align:left;padding:5px 6px;font-weight:600;
  border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;font-size:10px}
.ftable td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.ftable td:not(:first-child){text-align:right;font-weight:700}.ftable tr:last-child td{border:none}
.ftot-row{display:flex;justify-content:space-around;background:rgba(245,197,24,.07);
  border:1px solid rgba(245,197,24,.18);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.ftot-item{text-align:center}.ftot-val{font-size:17px;font-weight:800;color:var(--gold)}
.ftot-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.save-food-btn{width:100%;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--green),#17a355);color:#fff;margin-top:8px}
.food-log-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.food-log-item:last-child{border:none}
.fli-name{flex:1;font-size:13px}.fli-cal{font-size:13px;font-weight:700;color:var(--gold)}
.fli-del,.fli-edit{font-size:15px;color:var(--text3);padding:0 3px;opacity:.7}
.fli-time{font-size:11px;color:var(--text3);display:block;margin-top:2px}
.day-total-row{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:4px;
  border-top:1px solid rgba(245,197,24,.15);font-size:13px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric-field{display:flex;flex-direction:column;gap:5px}
.metric-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
.metric-wrap{position:relative}
.metric-in{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 36px 10px 12px;color:var(--text);font-size:16px;font-weight:700;outline:none;-webkit-appearance:none}
.metric-in:focus{border-color:rgba(245,197,24,.4)}
.metric-unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none}
.save-btn-blue{width:100%;padding:13px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;
  background:linear-gradient(135deg,var(--blue),#2255cc);color:#fff;box-shadow:0 0 12px rgba(61,127,255,.2)}

/* PROGRESS */
.prog-scrl{overflow-y:auto;flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px}
.chart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-ttl{font-size:15px;font-weight:700}
.chart-period{font-size:11px;color:var(--text3);background:var(--surface2);padding:3px 8px;border-radius:6px}
.week-bars{display:flex;gap:6px;align-items:flex-end;height:64px;margin:12px 0 4px}
.wb{flex:1;border-radius:4px 4px 0 0;min-height:4px;transition:height .4s ease}
.week-days{display:flex;gap:6px}
.wd-lbl{flex:1;text-align:center;font-size:10px;color:var(--text3);font-weight:600}
.wd-lbl.today{color:var(--gold)}
.meas-table{width:100%;border-collapse:collapse;font-size:13px}
.meas-table th{color:var(--text3);text-align:left;padding:6px 0;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.meas-table td{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-weight:600}
.meas-table td:not(:first-child){text-align:right}.meas-table tr:last-child td{border:none}
.delta-pos{color:var(--red);font-size:11px}.delta-neg{color:var(--green);font-size:11px}
.adapt-card{background:linear-gradient(135deg,rgba(61,127,255,.08),rgba(61,127,255,.04));
  border:1px solid rgba(61,127,255,.2);border-radius:20px;padding:18px}
.adapt-result{margin-top:12px;font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap}
.wlog-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.wlog-row:last-child{border:none}
.wlog-date{font-size:13px;color:var(--text2);flex:1}.wlog-val{font-size:14px;font-weight:700}
.wlog-act{font-size:15px;color:var(--text3);padding:2px 6px;cursor:pointer;opacity:.7}

/* PROFILE */
.prof-scrl{overflow-y:auto;flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.prof-hero{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;
  display:flex;align-items:center;gap:16px}
.prof-av{width:64px;height:64px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#000;
  box-shadow:0 0 20px rgba(245,197,24,.3)}
.prof-name{font-size:20px;font-weight:800}.prof-goal{font-size:13px;color:var(--text2);margin-top:3px}
.prof-meta{font-size:12px;color:var(--text3);margin-top:5px}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.sec-card-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;
  border-bottom:1px solid var(--border);font-size:14px}
.sec-card-row:last-child{border:none}
.sec-card-lbl{color:var(--text2)}.sec-card-val{font-weight:700}
.btn-reset{width:100%;padding:14px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text2)}

/* SHARED */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 20px;text-align:center}
.empty-ico{font-size:52px}.empty-txt{font-size:14px;color:var(--text2);line-height:1.5}
.go-btn{padding:12px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 0 14px rgba(245,197,24,.25)}
.spin{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--gold);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);
  box-shadow:0 4px 24px rgba(0,0,0,.4);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.disc{font-size:11px;color:var(--text3);text-align:center;padding:4px 0}
.qe-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.qe-overlay.on{opacity:1;pointer-events:all}
.qe-sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--bg2);
  border-radius:20px 20px 0 0;padding:16px 20px 40px;
  transform:translateY(100%);transition:transform .26s cubic-bezier(.32,1,.23,1);max-width:480px;margin:0 auto}
.qe-sheet.on{transform:translateY(0)}
.qe-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.qe-title{font-size:16px;font-weight:700;margin-bottom:14px}
.qe-input{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);
  padding:13px 16px;color:var(--text);font-size:22px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none}
.qe-btns{display:flex;gap:10px;margin-top:14px}
.qe-btn-cancel{flex:1;padding:13px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text2)}
.qe-btn-save{flex:2;padding:13px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
</style>
</head>
<body>
<div id="app">

  <div class="hdr" id="hdr">
    <div class="logo">P.A.R.K.E.R.</div>
    <div class="hdr-title" id="hdr-title"></div>
    <div class="streak-chip" id="streak-chip" style="display:none"><span>🔥</span><span id="streak-val">0</span></div>
    <div class="hdr-avatar" id="hdr-av" style="display:none"></div>
  </div>

  <!-- ONBOARDING -->
  <div class="screen on" id="sc-onboard" style="overflow:hidden">
    <div class="onb-wrap" id="onb-wrap">
      <div class="onb-progress" id="onb-prog"></div>

      <!-- Step 1: Name + Gender -->
      <div class="onb-step on" id="os-1">
        <div class="onb-q">Привет! 👋<br>Как тебя зовут?</div>
        <div class="field">
          <input class="finput" id="o-name" type="text" placeholder="Твоё имя" autocomplete="off" autocorrect="off">
        </div>
        <div class="onb-q" style="font-size:18px">Ты...</div>
        <div class="gender-row">
          <div class="g-btn on" id="g-male" onclick="pickGender('male')">👨 Парень</div>
          <div class="g-btn" id="g-female" onclick="pickGender('female')">👩 Девушка</div>
        </div>
        <div class="onb-nav">
          <button class="btn-primary" onclick="onbNext(1)">Далее →</button>
        </div>
      </div>

      <!-- Step 2: Birthday -->
      <div class="onb-step" id="os-2">
        <div class="onb-q">Дата рождения?</div>
        <div class="onb-sub">Нужно для точного расчёта метаболизма</div>
        <div class="dp-wrap" id="dp-wrap">
          <div class="dp-col" id="dp-day"></div>
          <div class="dp-col" id="dp-month"></div>
          <div class="dp-col" id="dp-year"></div>
          <div class="dp-highlight"></div>
        </div>
        <div class="dp-date-disp" id="dp-display">—</div>
        <div class="onb-nav">
          <button class="btn-back" onclick="showOnbStep(1)">←</button>
          <button class="btn-primary" onclick="onbNext(2)">Далее →</button>
        </div>
      </div>

      <!-- Step 3: Height + Weight -->
      <div class="onb-step" id="os-3">
        <div class="onb-q">Рост и вес</div>
        <div class="grid2">
          <div class="field">
            <div class="flbl">Рост</div>
            <input class="finput big" id="o-ht" type="number" inputmode="numeric" placeholder="175">
            <div class="funit">см</div>
          </div>
          <div class="field">
            <div class="flbl">Вес</div>
            <input class="finput big" id="o-wt" type="number" inputmode="decimal" placeholder="80" step="0.1">
            <div class="funit">кг</div>
          </div>
        </div>
        <div class="onb-nav">
          <button class="btn-back" onclick="showOnbStep(2)">←</button>
          <button class="btn-primary" id="submit-btn" onclick="submitOnboarding()">Создать план 🚀</button>
        </div>
        <div class="disc">⚕️ Результаты носят рекомендательный характер. Проконсультируйся с врачом перед началом программы.</div>
      </div>

    </div>
  </div>

  <div class="screen" id="sc-home"><div class="home-scrl" id="home-content"></div></div>
  <div class="screen" id="sc-chat">
    <div class="chat-wrap" id="chat-msgs"></div>
    <div class="chat-input-area">
      <div class="chat-row">
        <textarea class="chat-in" id="chat-in" rows="1" placeholder="Спроси Арни..."></textarea>
        <button class="send-btn" id="chat-send">➤</button>
      </div>
    </div>
  </div>
  <div class="screen" id="sc-tracker"><div class="tracker-scrl" id="tracker-content"></div></div>
  <div class="screen" id="sc-progress"><div class="prog-scrl" id="progress-content"></div></div>
  <div class="screen" id="sc-profile"><div class="prof-scrl" id="profile-content"></div></div>

  <div class="nav" id="nav" style="display:none">
    <button class="ntab" data-sc="progress" onclick="goTab('progress')"><div class="ni">📊</div>Прогресс</button>
    <button class="ntab" data-sc="chat"     onclick="goTab('chat')"><div class="ni">💬</div>Арни</button>
    <button class="ntab center" data-sc="home" onclick="goTab('home')"><div class="ni">🏠</div>Главная</button>
    <button class="ntab" data-sc="tracker"  onclick="goTab('tracker')"><div class="ni">📝</div>Трекер</button>
    <button class="ntab" data-sc="profile"  onclick="goTab('profile')"><div class="ni">👤</div>Профиль</button>
  </div>

  <input type="file" id="photo-input" accept="image/*" capture="environment">

  <div class="qe-overlay" id="qe-overlay" onclick="closeQE()"></div>
  <div class="qe-sheet" id="qe-sheet">
    <div class="qe-handle"></div>
    <div class="qe-title" id="qe-title">Редактировать</div>
    <input class="qe-input" id="qe-input" type="number" inputmode="decimal" step="0.1">
    <div class="qe-btns">
      <button class="qe-btn-cancel" onclick="closeQE()">Отмена</button>
      <button class="qe-btn-save" onclick="saveQE()">Сохранить</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
// ══ TELEGRAM ══
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.disableVerticalSwipes?.(); }
function getTgId() {
  try { return JSON.parse(new URLSearchParams(tg?.initData||'').get('user')||'{}').id||null; }
  catch { return null; }
}
function getTgName() {
  try { return JSON.parse(new URLSearchParams(tg?.initData||'').get('user')||'{}').first_name||null; }
  catch { return null; }
}

// ══ STATE ══
let profile   = JSON.parse(localStorage.getItem('pk_profile') || 'null');
let planData  = JSON.parse(localStorage.getItem('pk_plan')    || 'null');
let chatHist  = JSON.parse(localStorage.getItem('pk_chat')    || '[]');
let logs      = JSON.parse(localStorage.getItem('pk_logs')    || '[]');
let foodLogs  = JSON.parse(localStorage.getItem('pk_food')    || '[]');
let measLogs  = JSON.parse(localStorage.getItem('pk_meas')    || '[]');

function todayKey() { return new Date().toLocaleDateString('ru-RU'); }
function getWater() { return parseInt(localStorage.getItem('pk_water_'+todayKey())||'0'); }
function setWater(v) { localStorage.setItem('pk_water_'+todayKey(), String(v)); }

function persist() {
  try {
    localStorage.setItem('pk_profile', JSON.stringify(profile));
    localStorage.setItem('pk_plan',    JSON.stringify(planData));
    localStorage.setItem('pk_chat',    JSON.stringify(chatHist));
    localStorage.setItem('pk_logs',    JSON.stringify(logs));
    localStorage.setItem('pk_food',    JSON.stringify(foodLogs));
    localStorage.setItem('pk_meas',    JSON.stringify(measLogs));
  } catch(e) { console.warn('persist error', e); }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, dur=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function autoResize(el) {
  el.addEventListener('input', () => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,96)+'px'; });
}

function scrollBottom(el) { setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50); }

function calcStreak() {
  const days = new Set([...foodLogs.map(f=>f.date), ...logs.filter(l=>l.weight).map(l=>l.date)]);
  let streak=0; const d=new Date();
  for (let i=0;i<90;i++) {
    if (days.has(d.toLocaleDateString('ru-RU'))) streak++;
    else if (i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

const GOAL_RU = {
  lose_weight:'Снижение веса', gain_muscle:'Набор массы',
  maintain:'Поддержание формы', recomposition:'Рекомпозиция',
};

// ══ ONBOARDING ══
const ONB_TOTAL = 3;
let onbData = { gender: 'male' };

function buildOnbProgress(step) {
  document.getElementById('onb-prog').innerHTML =
    Array.from({length:ONB_TOTAL},(_,i)=>{
      const cls = i+1<step?'done':i+1===step?'active':'';
      return `<div class="onb-dot ${cls}"></div>`;
    }).join('');
}

function showOnbStep(n) {
  document.querySelectorAll('.onb-step').forEach(s=>s.classList.remove('on'));
  document.getElementById(`os-${n}`)?.classList.add('on');
  buildOnbProgress(n);
  document.getElementById('onb-wrap').scrollTop = 0;
  if (n===2) initDatePicker();
}

function pickGender(v) {
  onbData.gender = v;
  document.getElementById('g-male').classList.toggle('on', v==='male');
  document.getElementById('g-female').classList.toggle('on', v==='female');
}

function onbNext(step) {
  if (step===1) {
    const v = document.getElementById('o-name').value.trim();
    if (!v||v.length<2) { toast('Введи имя'); return; }
    onbData.name = v.charAt(0).toUpperCase()+v.slice(1);
    showOnbStep(2);
  } else if (step===2) {
    const bd = getSelectedDate();
    if (!bd) return;
    onbData.birthday = bd.iso;
    onbData.age = bd.age;
    showOnbStep(3);
  }
}

// ══ DATE PICKER ══
const MONTHS_RU  = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTHS_GEN = ['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'];
let dpDone = false;

function initDatePicker() {
  if (dpDone) return; dpDone = true;
  const now = new Date();
  const minY = now.getFullYear()-70, maxY = now.getFullYear()-14;

  const dayCol = document.getElementById('dp-day');
  dayCol.innerHTML = '<div class="dp-pad"></div>' +
    Array.from({length:31},(_,i)=>`<div class="dp-item" data-v="${i+1}">${String(i+1).padStart(2,'0')}</div>`).join('') +
    '<div class="dp-pad"></div>';

  const monCol = document.getElementById('dp-month');
  monCol.innerHTML = '<div class="dp-pad"></div>' +
    MONTHS_RU.map((m,i)=>`<div class="dp-item" data-v="${i}">${m}</div>`).join('') +
    '<div class="dp-pad"></div>';

  const yrCol = document.getElementById('dp-year');
  yrCol.innerHTML = '<div class="dp-pad"></div>' +
    Array.from({length:maxY-minY+1},(_,i)=>`<div class="dp-item" data-v="${minY+i}">${minY+i}</div>`).join('') +
    '<div class="dp-pad"></div>';

  // Default: 25 years ago, current month, day 1
  const defYear = now.getFullYear()-25, defMon = now.getMonth(), defDay = 0;
  scrollDpTo('dp-day',   defDay);
  scrollDpTo('dp-month', defMon);
  scrollDpTo('dp-year',  defYear - minY);

  ['dp-day','dp-month','dp-year'].forEach(id => {
    document.getElementById(id).addEventListener('scroll', updateDpDisplay, {passive:true});
  });
  updateDpDisplay();
}

function scrollDpTo(id, idx) {
  const el = document.getElementById(id);
  el.scrollTop = idx * 40;
}

function getDpIdx(id) { return Math.round(document.getElementById(id).scrollTop / 40); }

function getSelectedDate() {
  const now = new Date();
  const minY = now.getFullYear()-70;
  const day  = getDpIdx('dp-day') + 1;
  const mon  = getDpIdx('dp-month');   // 0-based
  const year = minY + getDpIdx('dp-year');
  const d = new Date(year, mon, day);
  const age = Math.floor((now - d) / (365.25*24*3600*1000));
  if (age<14||age>70) { toast('Введи реальную дату рождения'); return null; }
  return {
    iso: `${year}-${String(mon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`,
    age
  };
}

function updateDpDisplay() {
  const now = new Date(), minY = now.getFullYear()-70;
  const day  = getDpIdx('dp-day')+1;
  const mon  = getDpIdx('dp-month');
  const year = minY + getDpIdx('dp-year');
  const el = document.getElementById('dp-display');
  if (el) el.textContent = `${day} ${MONTHS_GEN[mon]} ${year}`;
  ['dp-day','dp-month','dp-year'].forEach(id => {
    const col = document.getElementById(id);
    const idx = getDpIdx(id);
    col.querySelectorAll('.dp-item').forEach((it,i) => it.classList.toggle('sel', i===idx));
  });
}

// ══ SUBMIT ══
async function submitOnboarding() {
  const ht = parseInt(document.getElementById('o-ht').value);
  const wt = parseFloat(document.getElementById('o-wt').value);
  if (!ht||ht<100||ht>250) { toast('Введи рост (100–250 см)'); return; }
  if (!wt||wt<20 ||wt>300) { toast('Введи вес (20–300 кг)'); return; }
  onbData.height_cm = ht; onbData.weight_kg = wt;
  onbData.goal = 'maintain';
  const tgId = getTgId();
  if (tgId) onbData.tg_id = tgId;

  document.getElementById('os-3').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 0">
      <div class="spin"></div>
      <div style="font-size:18px;font-weight:800">Арни составляет план...</div>
      <div style="font-size:13px;color:var(--text2);text-align:center;line-height:1.5">
        Питание на 7 дней<br>+ программа тренировок
      </div>
    </div>`;

  try {
    const r = await fetch('/api/profile', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(onbData)
    });
    if (!r.ok) {
      let msg = `Ошибка сервера (${r.status})`;
      try { const e = await r.json(); msg = e.detail||e.error||msg; } catch {}
      throw new Error(msg);
    }
    const data = await r.json();
    planData = data; profile = {...onbData};
    chatHist = []; setWater(0);
    persist();
    launchApp(true);
  } catch(e) {
    document.getElementById('os-3').innerHTML = `
      <div style="color:var(--red);text-align:center;padding:20px;font-size:14px;line-height:1.5">${escHtml(e.message||'Ошибка')}</div>
      <div class="onb-nav" style="margin-top:16px">
        <button class="btn-primary" onclick="location.reload()">Попробовать снова</button>
      </div>`;
  }
}

function launchApp(isNew) {
  document.getElementById('sc-onboard').classList.remove('on');
  document.getElementById('nav').style.display = 'flex';
  updateHeader(); goTab('home'); initChat(isNew);
}

// ══ SERVER SYNC ══
async function tryLoadFromServer() {
  const tgId = getTgId(); if (!tgId) return false;
  try {
    const r = await fetch(`/api/user?tg_id=${tgId}`);
    if (!r.ok) return false;
    const data = await r.json();
    if (!data.found) return false;
    const p = data.profile;
    profile = {
      name:p.name||getTgName()||'друг', gender:p.gender||'male',
      age:p.age, height_cm:p.height_cm, weight_kg:p.weight_kg,
      goal:p.goal||'maintain', tg_id:p.tg_id, birthday:p.birthday,
    };
    planData = { macros:data.macros||{}, nutrition_plan:data.nutrition_plan||'', workout_plan:data.workout_plan||'' };
    if (Array.isArray(data.chat_history) && data.chat_history.length)
      chatHist = data.chat_history;
    persist(); return true;
  } catch { return false; }
}

async function saveChatToServer() {
  const tgId = getTgId(); if (!tgId||!chatHist.length) return;
  try {
    fetch('/api/chat/history', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({tg_id:tgId, history:chatHist.slice(-100)})
    });
  } catch {}
}

// ══ NAVIGATION ══
const TAB_SCREENS = {progress:'sc-progress',chat:'sc-chat',home:'sc-home',tracker:'sc-tracker',profile:'sc-profile'};
const TAB_TITLES  = {progress:'Прогресс',chat:'Тренер Арни',home:'',tracker:'Трекер',profile:'Профиль'};
let curTab = 'home';

function goTab(name) {
  curTab = name;
  Object.keys(TAB_SCREENS).forEach(k => {
    document.getElementById(TAB_SCREENS[k]).classList.toggle('on', k===name);
    document.querySelector(`.ntab[data-sc="${k}"]`)?.classList.toggle('on', k===name);
  });
  document.getElementById('hdr-title').textContent = TAB_TITLES[name];
  if (name==='home')     renderHome();
  if (name==='tracker')  renderTracker();
  if (name==='progress') renderProgress();
  if (name==='profile')  renderProfile();
}

function updateHeader() {
  if (!profile) return;
  const av = document.getElementById('hdr-av');
  av.textContent = (profile.name||'?')[0].toUpperCase(); av.style.display='flex';
  const s = calcStreak();
  if (s>0) { document.getElementById('streak-chip').style.display='flex'; document.getElementById('streak-val').textContent=s; }
}

// ══ HOME ══
function renderHome() {
  const el = document.getElementById('home-content');
  if (!profile||!planData) { el.innerHTML=''; return; }
  const m = planData.macros||{};
  const today = todayKey();
  const consumed = foodLogs.filter(f=>f.date===today).reduce((a,f)=>({
    cal:a.cal+(f.total?.calories||0), p:a.p+(f.total?.protein_g||0),
    fat:a.fat+(f.total?.fat_g||0),   c:a.c+(f.total?.carb_g||0),
  }),{cal:0,p:0,fat:0,c:0});
  const target = {cal:m.calories||2000, p:m.protein_g||150, fat:m.fat_g||70, c:m.carb_g||200};
  const pct=(v,t)=>Math.min(100,Math.round(v/t*100));
  const remaining = Math.max(0, target.cal - Math.round(consumed.cal));
  const calPct = pct(consumed.cal, target.cal);
  const R=44, circ=2*Math.PI*R, dash=circ*(1-calPct/100);

  const water = getWater();
  const wPct = Math.min(100, Math.round(water/2500*100));

  const dayNum = ((new Date().getDay()+6)%7)+1;
  const dayNames=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const workoutHtml = planData.workout_plan ? (()=>{
    const lines = planData.workout_plan.split('\n').filter(Boolean);
    const dayLine = lines.find(l=>l.toLowerCase().includes(`день ${dayNum}`)||l.toLowerCase().includes(`day ${dayNum}`));
    const isRest = dayLine?.toLowerCase().includes('отдых')||dayLine?.toLowerCase().includes('rest');
    return `<div class="day-card">
      <div class="day-hd">
        <div class="day-ttl">🏋️ Сегодня — ${dayNames[dayNum-1]}</div>
        <div class="day-badge ${isRest?'rest':''}">${isRest?'Отдых':'Тренировка'}</div>
      </div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">${escHtml(dayLine||'Смотри план тренировок ниже')}</div>
    </div>`;
  })() : '';

  const nutrCard = planData.nutrition_plan ? `
    <div class="plan-card" id="home-nutr-card">
      <div class="plan-hd" onclick="togglePlan('home-nutr-card')">
        <div class="plan-ttl">🍽 Рацион на 7 дней</div><div class="plan-chevron">▼</div>
      </div>
      <pre class="plan-body">${escHtml(planData.nutrition_plan)}</pre>
    </div>` : '';

  const wrkCard = planData.workout_plan ? `
    <div class="plan-card" id="home-wrk-card">
      <div class="plan-hd" onclick="togglePlan('home-wrk-card')">
        <div class="plan-ttl">💪 Тренировки на 7 дней</div><div class="plan-chevron">▼</div>
      </div>
      <pre class="plan-body">${escHtml(planData.workout_plan)}</pre>
    </div>` : '';

  el.innerHTML = `
    <div class="ring-card">
      <div class="ring-wrap">
        <svg width="90" height="90" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="${R}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="8"/>
          <circle cx="48" cy="48" r="${R}" fill="none" stroke="var(--gold)" stroke-width="8"
            stroke-dasharray="${circ}" stroke-dashoffset="${dash}" stroke-linecap="round"
            style="transition:stroke-dashoffset .6s ease"/>
        </svg>
        <div class="ring-center"><div class="ring-cal">${remaining}</div><div class="ring-lbl">осталось</div></div>
      </div>
      <div class="ring-stats">

// ══ CHAT ══
function sanitizeHist(hist) {
  const clean=[];
  for (const msg of hist) {
    const role=(msg?.role||''), content=(msg?.content||'').toString().trim();
    if (!['user','assistant'].includes(role)||!content) continue;
    if (clean.length&&clean[clean.length-1].role===role) clean[clean.length-1].content+='\n'+content;
    else clean.push({role,content});
  }
  return clean;
}

function initChat(isNew) {
  const el = document.getElementById('chat-msgs'); el.innerHTML='';
  const hist = sanitizeHist(chatHist);
  if (hist.length>0) {
    hist.forEach(m=>addMsg(el,m.role==='user'?'u':'p',m.content,m.role==='assistant'?'Арни':null));
    scrollBottom(el);
  } else {
    const name = profile?.name||'друг';
    const greeting = `Привет, ${name}! 💪\n\nЯ Арни — твой персональный тренер и нутрициолог.\n\nЯ уже рассчитал твой рацион на 7 дней и программу тренировок — всё на главном экране.\n\nЧто тебя интересует? Могу объяснить план, дать советы по питанию, рассказать про упражнения — или просто поболтать о прогрессе 🔥`;
    addMsg(el,'p',greeting,'Арни');
    chatHist.push({role:'assistant',content:greeting}); persist();
  }
  const btn=document.getElementById('chat-send'), inp=document.getElementById('chat-in');
  autoResize(inp);
  btn.onclick=()=>sendChat();
  inp.onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); } };
}

function addMsg(el,cls,text,sender) {
  const div=document.createElement('div'); div.className=`msg ${cls}`;
  if(sender) div.innerHTML=`<div class="msender">${escHtml(sender)}</div>`;
  const bub=document.createElement('div'); bub.className='mbub'; bub.textContent=text;
  div.appendChild(bub); el.appendChild(div); return div;
}

async function sendChat() {
  const inp=document.getElementById('chat-in'), msg=inp.value.trim(); if(!msg) return;
  const btn=document.getElementById('chat-send'), el=document.getElementById('chat-msgs');
  inp.value=''; inp.style.height='auto'; btn.disabled=true;
  addMsg(el,'u',msg); scrollBottom(el);
  const typ=document.createElement('div'); typ.className='typing';
  typ.innerHTML='<span></span><span></span><span></span>'; el.appendChild(typ); scrollBottom(el);
  try {
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,history:sanitizeHist(chatHist),profile})});
    const data=await r.json(); typ.remove();
    const reply=data.reply||'Не удалось получить ответ.';
    addMsg(el,'p',reply,'Арни');
    chatHist.push({role:'user',content:msg}); chatHist.push({role:'assistant',content:reply});
    persist(); saveChatToServer();
  } catch { typ.remove(); addMsg(el,'p','Связь прервалась. Попробуй ещё раз 🤙'); }
  btn.disabled=false; scrollBottom(el);
}

function saveMetrics() {
  const wt=parseFloat(document.getElementById('m-wt')?.value);
  const sl=parseFloat(document.getElementById('m-sl')?.value);
  const chest=parseFloat(document.getElementById('m-chest')?.value);
  const waist=parseFloat(document.getElementById('m-waist')?.value);
  const hips=parseFloat(document.getElementById('m-hips')?.value);
  const arm=parseFloat(document.getElementById('m-arm')?.value);
  const today=todayKey();
  if(wt&&(wt<20||wt>300)){toast('Проверь вес');return;}
  const entry={date:today,ts:Date.now(),weight:wt||null,sleep:sl||null};
  const i=logs.findIndex(l=>l.date===today);
  if(i>=0)Object.assign(logs[i],entry); else logs.push(entry);
  if(wt&&profile)profile.weight_kg=wt;
  if(chest||waist||hips||arm){
    const mi=measLogs.findIndex(m=>m.date===today);
    const me={date:today,chest:chest||null,waist:waist||null,hips:hips||null,arm:arm||null};
    if(mi>=0)Object.assign(measLogs[mi],me); else measLogs.push(me);
  }
  persist(); renderTracker(); if(curTab==='home')renderHome(); toast('Сохранено! ✓');
}

function renderProgress() {
  const el=document.getElementById('progress-content');
  const weightLogs=logs.filter(l=>l.weight).slice(-14);
  const calMap={};
  foodLogs.forEach(f=>{if(!calMap[f.date])calMap[f.date]=0;calMap[f.date]+=(f.total?.calories||0);});
  const calLogs=Object.entries(calMap).slice(-7).map(([date,cal])=>({date,cal}));

  if(!weightLogs.length&&!calLogs.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-ico">📊</div>
      <div class="empty-txt">Начни вносить данные — здесь появятся графики</div>
      <button class="go-btn" onclick="goTab('tracker')">Перейти в трекер →</button></div>`;return;
  }

  const weightChart=(()=>{
    if(weightLogs.length<2) return '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Нужно минимум 2 записи</div>';
    const vals=weightLogs.map(l=>l.weight);
    const W=320,H=80,pad=10;
    const minV=Math.min(...vals)-.5,maxV=Math.max(...vals)+.5;
    const x=i=>pad+(i/(vals.length-1))*(W-pad*2);
    const y=v=>H-pad-((v-minV)/(maxV-minV))*(H-pad*2);
    const pts=vals.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
    const dots=vals.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="4" fill="var(--gold)"/>`).join('');
    const delta=(vals[vals.length-1]-vals[0]).toFixed(1);
    const dCls=parseFloat(delta)>0?'color:var(--red)':'color:var(--green)';
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:22px;font-weight:800">${vals[vals.length-1]} кг</div>
      <div style="font-size:13px;font-weight:700;${dCls}">${parseFloat(delta)>0?'+':''}${delta} кг за период</div>
    </div>
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--gold)" stop-opacity=".25"/><stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${pts} ${x(vals.length-1).toFixed(1)},${H} ${pad},${H}" fill="url(#wg)"/>
      <polyline points="${pts}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round"/>
      ${dots}
    </svg>
    <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--text3)">
      <span>${weightLogs[0].date}</span><span>${weightLogs[weightLogs.length-1].date}</span>
    </div>`;
  })();

  const calChart=(()=>{
    if(!calLogs.length) return '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Нет данных</div>';
    const maxCal=Math.max(...calLogs.map(l=>l.cal),planData?.macros?.calories||2000);
    const target=planData?.macros?.calories||2000;
    const bars=calLogs.map(l=>{
      const p=Math.max(4,Math.round(l.cal/maxCal*100));
      const c=l.cal>target*1.1?'var(--red)':l.cal<target*0.7?'var(--blue)':'var(--green)';
      return `<div class="wb" style="height:${p}%;background:${c};opacity:${l.date===todayKey()?1:.7}"></div>`;
    }).join('');
    const labels=calLogs.map(l=>`<div class="wd-lbl ${l.date===todayKey()?'today':''}">${l.date.split('.').slice(0,2).join('.')}</div>`).join('');
    return `<div class="week-bars">${bars}</div><div class="week-days">${labels}</div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:11px">
        <span style="color:var(--green)">● Норма</span><span style="color:var(--blue)">● Мало</span><span style="color:var(--red)">● Превышение</span>
      </div>`;
  })();

  const measTable=(()=>{
    if(!measLogs.length) return '';
    const rows=measLogs.slice(-5).reverse().map((m,i,arr)=>{
      const prev=arr[i+1];
      const d=(f,p)=>{if(!f||!p)return'';const v=(f-p).toFixed(1);return parseFloat(v)>0?`<span class="delta-pos">+${v}</span>`:`<span class="delta-neg">${v}</span>`;};
      return `<tr><td style="color:var(--text2)">${m.date}</td>
        <td>${m.chest||'—'} ${prev?d(m.chest,prev.chest):''}</td>
        <td>${m.waist||'—'} ${prev?d(m.waist,prev.waist):''}</td>
        <td>${m.hips||'—'} ${prev?d(m.hips,prev.hips):''}</td>
        <td>${m.arm||'—'} ${prev?d(m.arm,prev.arm):''}</td>
      </tr>`;
    }).join('');
    return `<div class="chart-card" style="margin-top:0">
      <div class="chart-hd"><div class="chart-ttl">📐 Замеры тела</div></div>
      <table class="meas-table"><thead><tr><th>Дата</th><th>Грудь</th><th>Талия</th><th>Бёдра</th><th>Рука</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  })();

  const wlogRows=weightLogs.slice(-7).reverse().map(l=>`
    <div class="wlog-row">
      <span class="wlog-date">${l.date}</span><span class="wlog-val">${l.weight} кг</span>
      <span class="wlog-act" onclick="editWeightLog('${l.date}')">✏️</span>
      <span class="wlog-act" onclick="deleteWeightLog('${l.date}')">✕</span>
    </div>`).join('');

  el.innerHTML=`
    <div class="adapt-card">
      <div class="chart-hd"><div class="chart-ttl">🤖 Адаптация плана</div></div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Арни проанализирует данные за неделю и скорректирует план</div>
      <button class="save-btn-blue" id="adapt-btn" onclick="getWeeklyAdapt()">Получить адаптацию ↗</button>
      <div class="adapt-result" id="adapt-result" style="display:none"></div>
    </div>
    <div class="chart-card">
      <div class="chart-hd"><div class="chart-ttl">⚖️ Динамика веса</div><div class="chart-period">14 дней</div></div>
      ${weightChart}
    </div>
    ${weightLogs.length?`<div class="chart-card" style="margin-top:0">
      <div class="chart-hd"><div class="chart-ttl">📋 История веса</div></div>${wlogRows}</div>`:''}
    <div class="chart-card">
      <div class="chart-hd"><div class="chart-ttl">🔥 Калории / день</div><div class="chart-period">7 дней</div></div>
      ${calChart}
    </div>
    ${measTable}`;
}

function renderProfile() {
  const el=document.getElementById('profile-content'); if(!profile) return;
  const m=planData?.macros||{};
  const goal=GOAL_RU[profile.goal]||profile.goal||'—';
  const bmi=profile.height_cm&&profile.weight_kg?(profile.weight_kg/Math.pow(profile.height_cm/100,2)).toFixed(1):'—';
  const bmiLbl=()=>{const b=parseFloat(bmi);if(isNaN(b))return'';if(b<18.5)return'(Дефицит)';if(b<25)return'(Норма)';if(b<30)return'(Избыток)';return'(Ожирение)';};
  const curW=(logs.slice().reverse().find(l=>l.weight)?.weight)||profile.weight_kg||'—';
  const streak=calcStreak();

  const rows=[
    ['Пол',     profile.gender==='male'?'Мужской':'Женский'],
    ['Возраст', `${profile.age} лет`],
    ['Рост',    `${profile.height_cm} см`],
    ['Вес',     `${curW} кг`],
    ['ИМТ',     `${bmi} ${bmiLbl()}`],
    ['Цель',    goal],
    m.calories?['Калории',`${m.calories} ккал/день`]:null,
    m.protein_g?['Белки / Жиры / Углев',`${m.protein_g}г / ${m.fat_g}г / ${m.carb_g}г`]:null,
    [`🔥 Стрик`, `${streak} ${streak===1?'день':streak<5?'дня':'дней'}`],
  ].filter(Boolean).map(([l,v])=>`<div class="sec-card-row"><div class="sec-card-lbl">${l}</div><div class="sec-card-val">${v}</div></div>`).join('');

  el.innerHTML=`
    <div class="prof-hero">
      <div class="prof-av">${(profile.name||'?')[0].toUpperCase()}</div>
      <div style="flex:1">
        <div class="prof-name">${profile.name}</div>
        <div class="prof-goal">${goal}</div>
        <div class="prof-meta">${profile.age} лет · ${profile.height_cm} см · ${curW} кг</div>
      </div>
    </div>
    <div class="sec-card">${rows}</div>
    <button class="btn-reset" onclick="confirmReset()" style="margin-top:4px">🔄 Начать заново</button>
    <div class="disc">Данные хранятся на устройстве. При сбросе всё будет удалено.</div>`;
}

function confirmReset() {
  if(tg?.showConfirm) tg.showConfirm('Сбросить профиль?',ok=>{if(ok)doReset();});
  else if(confirm('Сбросить?')) doReset();
}
function doReset() { localStorage.clear(); location.reload(); }

// ══ QUICK EDIT ══
let _qeCb=null;
function openQE(title,val,cb) {
  _qeCb=cb; document.getElementById('qe-title').textContent=title;
  document.getElementById('qe-input').value=val||'';
  document.getElementById('qe-overlay').classList.add('on');
  document.getElementById('qe-sheet').classList.add('on');
  setTimeout(()=>document.getElementById('qe-input').focus(),280);
}
function closeQE() { document.getElementById('qe-overlay').classList.remove('on'); document.getElementById('qe-sheet').classList.remove('on'); _qeCb=null; }
function saveQE() { const v=parseFloat(document.getElementById('qe-input').value); if(isNaN(v)){toast('Введи число');return;} if(_qeCb)_qeCb(v); closeQE(); }
function editWeightLog(date) {
  const e=logs.find(l=>l.date===date); if(!e) return;
  openQE(`Вес за ${date} (кг)`,e.weight,v=>{if(v<20||v>300){toast('Проверь значение');return;}e.weight=v;if(profile)profile.weight_kg=v;persist();renderProgress();toast('Вес обновлён ✓');});
}
function deleteWeightLog(date) { logs=logs.map(l=>l.date===date?{...l,weight:null}:l); persist(); renderProgress(); toast('Удалено'); }

// ══ ADAPTATION ══
async function getWeeklyAdapt() {
  if(!profile){toast('Сначала заполни профиль');return;}
  const btn=document.getElementById('adapt-btn'), res=document.getElementById('adapt-result');
  if(!btn||!res) return;
  btn.textContent='Арни анализирует...'; btn.disabled=true; res.style.display='none';
  try {
    const r=await fetch('/api/adapt',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({profile,logs:logs.slice(-14),food_logs:foodLogs.slice(-50),current_macros:planData?.macros||{}})});
    const data=await r.json();
    if(data.error){res.style.display='block';res.textContent=data.error;return;}
    let txt='';
    if(data.summary) txt+=data.summary+'\n\n';
    if(data.calorie_adjust&&data.calorie_adjust!==0) txt+=`📊 Корректировка: ${data.calorie_adjust>0?'+':''}${data.calorie_adjust} ккал\n\n`;
    if(Array.isArray(data.recommendations)&&data.recommendations.length)
      txt+=data.recommendations.map((r,i)=>`${i+1}. ${r}`).join('\n');
    if(data.motivation) txt+='\n\n💪 '+data.motivation;
    if(!txt) txt=JSON.stringify(data,null,2);
    res.style.display='block'; res.textContent=txt; toast('Анализ готов! 🤖');
  } catch { res.style.display='block'; res.textContent='Ошибка соединения — попробуй позже.'; }
  finally { btn.textContent='Обновить адаптацию ↻'; btn.disabled=false; }
}

window.editWeightLog=editWeightLog;
window.deleteWeightLog=deleteWeightLog;

// ══ BOOT ══
showOnbStep(1);

(async function boot() {
  if (profile && planData) {
    document.getElementById('sc-onboard').classList.remove('on');
    document.getElementById('nav').style.display = 'flex';
    updateHeader(); goTab('home'); initChat(false);
  } else {
    const loaded = await tryLoadFromServer();
    if (loaded && profile && planData) {
      document.getElementById('sc-onboard').classList.remove('on');
      document.getElementById('nav').style.display = 'flex';
      updateHeader(); goTab('home'); initChat(false);
    } else {
      document.getElementById('hdr-title').textContent = 'Знакомство';
    }
  }
})();
</script>
